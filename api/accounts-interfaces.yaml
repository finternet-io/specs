openapi: 3.0.4
info:
  title: "Finternet API - Account & Address Service"
  description: |
    The official API specification for the Finternet Account and Address (Identifier) services.

    ### Protocol-Agnostic Envelope
    All API interactions use a standard JSON envelope.

    **Request Envelope:**
    ```json
    {
      "context": { ... },
      "payload": { ... },
      "signature": { ... } // Optional
    }
    ```

    **Response Envelope (Success):**
    ```json
    {
      "context": { ..., "status": "successful" },
      "response": { ... }
    }
    ```

    **Response Envelope (Error):**
    ```json
    {
      "context": { ..., "status": "failed", "error": {"code": "...", "message": "..." },
      "response": {} // Empty on error
    }
    ```
    (Error details are in the context.error object)

    ### Authentication and Authorization
    This API uses a two-level authorization model contained within the `context`:

    1.  **Platform-Level (Developer) Authentication:**
        * `context.developer_token`: The B2B Developer's API Key/Token.
        * `context.developer_signature`: The B2B Developer's signature (e.g., RFC 9421) of the payload.

    2.  **User-Level (End-User) Authorization:**
        * `context.authorization`: The end-user's JWT session token (for session-based calls).
        * `signature` (top-level): The end-user's JWS for critical, cryptographically-signed operations.

    *Note for HTTP Clients:* As a convenience, the `developer_token` may be provided in the standard `Authorization: Bearer <token>` HTTP header, and the `developer_signature` in an `X-Finternet-Signature` header. The server will check the headers first, then fall back to the `context` object.
  version: "1.0.0"
servers:
  - url: "https://foundry.finternetlab.io"
    description: "Development Environment"
tags:
  - name: "Account"
    description: "Endpoints for user registration, authentication, and account management."
  - name: "Address"
    description: "Endpoints for managing human-readable identifiers (Addresses)."

# ===============================================================
#   PATHS
# ===============================================================

paths:
  # -------------------- Account --------------------
  /v1/account/create:
    post:
      tags:
        - "Account"
      summary: "Register a new account"
      description: "Creates a new user account, generates and stores the reproducible DID from the master public key, links the primary address, and registers the master key as the primary controller."
      security:
        - developerToken: []
        - developerSignature: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApiRequest_RegistrationRequest'
            examples:
              IndividualRegistration:
                summary: "Example for registering an Individual"
                value:
                  context:
                    id: "api.account.create"
                    version: "1.0"
                    ts: "2025-09-08T12:00:00Z"
                    msg_id: "a1b2c3d4-e5f6-7890-1234-567890abcdef"
                    developer_token: "dev_pk_..."
                  payload:
                    address: "alice@finternet" # Primary Address
                    email: "alice.smith@example.com"
                    password: "securePassword123"
                    name: "Alice Smith"
                    phoneNumber: "+919876543210"
                    publicKey: "0x04..." # Master Controller Key
                    entityType: "Individual"
              BusinessRegistration:
                summary: "Example for registering a Business"
                value:
                  context:
                    id: "api.account.create"
                    version: "1.0"
                    ts: "2025-09-08T12:01:00Z"
                    msg_id: "b2c3d4e5-f6a7-8901-2345-67890abcdef1"
                    developer_token: "dev_pk_..."
                  payload:
                    address: "acmecorp@finternet"
                    email: "contact@acmecorp.example.com"
                    password: "strongBusinessPassword456"
                    name: "Acme Corporation"
                    publicKey: "0x05..."
                    entityType: "Business"
      responses:
        '201':
          description: "Account registered successfully."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_RegistrationSuccess'
              example:
                context:
                  id: "api.account.create"
                  version: "1.0"
                  ts: "2025-09-08T12:00:01Z"
                  msg_id: "c1b2c3d4-e5f6-7890-1234-567890abcdef"
                  status: "successful"
                response:
                  did: "did:key:z6MkpTHR8VNsBxYAAWHut2Geadd9jSwuBa82SsoPfnH4Ujp"
                  message: "Account registered successfully."
        '400':
          description: "Bad request, such as a missing required field."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
              examples:
                MissingField:
                  summary: "Missing Required Field"
                  value:
                    context:
                      id: "api.account.create"
                      version: "1.0"
                      ts: "2025-09-08T12:00:00Z"
                      msg_id: "a1b2c3d4..."
                      status: "failed"
                      error:
                        code: "BAD_REQUEST"
                        message: "Field 'name' is required."
                    response: {}
        '409':
          description: "Conflict, an identifier is already in use."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
              examples:
                IdentifierTaken:
                  summary: "Address Taken"
                  value:
                    context:
                      id: "api.account.create"
                      version: "1.0"
                      ts: "2025-09-08T12:00:00Z"
                      msg_id: "a1b2c3d4..."
                      status: "failed"
                      error:
                        code: "IDENTIFIER_TAKEN"
                        message: "The address 'alice@finternet' is already in use."
                    response: {}

  /v1/account/update:
    post:
      tags:
        - "Account"
      summary: "Update account profile"
      description: "Allows an authenticated end-user to update their profile information. The account to update is determined by the session token."
      security:
        - developerToken: []
        - developerSignature: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApiRequest_UpdateAccountRequest'
            example:
              context:
                id: "api.account.update"
                version: "1.0"
                ts: "2025-09-09T10:00:00Z"
                msg_id: "d1e2f3a4-b5c6-7890-1234-567890abcdef"
                developer_token: "dev_pk_..."
                authorization: "Bearer <End_User_JWT_Token>"
              payload:
                name: "Alice Smith-Jones"
                phoneNumber: "+919876543211"
      responses:
        '200':
          description: "Account profile updated successfully."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_AccountProfile'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '409':
          description: "Conflict, the new phone number is already in use."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
              example:
                context:
                  id: "api.account.update"
                  version: "1.0"
                  ts: "2025-09-08T12:00:00Z"
                  msg_id: "a1b2c3d4..."
                  status: "failed"
                  error:
                    code: "PHONE_NUMBER_IN_USE"
                    message: "The phone number is already associated with another account."
                response: {}

  /v1/address/checkAvailability:
    post:
      tags:
        - "Address"
      summary: "Check address availability"
      description: "Checks if a given human-readable address is available for registration."
      security:
        - developerToken: []
        - developerSignature: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApiRequest_AvailabilityCheckRequest'
            example:
              context:
                id: "api.address.checkAvailability"
                version: "1.0"
                ts: "2025-09-08T11:00:00Z"
                msg_id: "e1f2a3b4-c5d6-7890-1234-567890abcdef"
                developer_token: "dev_pk_..."
              payload:
                address: "newuser@finternet"
      responses:
        '200':
          description: "Availability status of the identifier."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_AvailabilityResponse'
              example:
                context:
                  id: "api.address.checkAvailability"
                  version: "1.0"
                  ts: "2025-09-08T11:00:01Z"
                  msg_id: "f1a2b3c4-d5e6-7890-1234-567890abcdef"
                  status: "successful"
                response:
                  available: true

  /v1/account/login:
    post:
      tags:
        - "Account"
      summary: "User login"
      description: "Authenticates an end-user and returns *their* JWT session token. Requires Developer auth."
      security:
        - developerToken: []
        - developerSignature: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApiRequest_LoginRequest'
            example:
              context:
                id: "api.account.login"
                version: "1.0"
                ts: "2025-09-09T09:00:00Z"
                msg_id: "a1b2c3d4-e5f6-7890-1234-567890abcdef"
                developer_token: "dev_pk_..."
              payload:
                username: "alice@finternet"
                password: "securePassword123"
      responses:
        '200':
          description: "Login successful."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_AuthResponse'
              example:
                context:
                  id: "api.account.login"
                  version: "1.0"
                  ts: "2025-09-09T09:00:01Z"
                  msg_id: "b1c2d3e4-f5a6-7890-1234-567890abcdef"
                  status: "successful"
                response:
                  accessToken: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
                  tokenType: "Bearer"
                  expiresIn: 3600
        '401':
          $ref: '#/components/responses/UnauthorizedError' # Catches both dev auth and user auth failures

  /v1/account/logout:
    post:
      tags:
        - "Account"
      summary: "User logout"
      description: "Invalidates the end-user's current JWT session token. Requires Developer + User auth."
      security:
        - developerToken: []
        - developerSignature: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApiRequest_Empty'
            example:
              context:
                id: "api.account.logout"
                version: "1.0"
                ts: "2025-09-09T10:30:00Z"
                msg_id: "c1d2e3f4-a5b6-7890-1234-567890abcdef"
                developer_token: "dev_pk_..."
                authorization: "Bearer eyJ..."
              payload: {}
      responses:
        '200':
          description: "Logout successful."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_Success'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /v1/account/resetPassword:
    post:
      tags:
        - "Account"
      summary: "Reset password"
      description: "Initiates the password reset flow for an end-user's email address. Requires Developer auth."
      security:
        - developerToken: []
        - developerSignature: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApiRequest_ResetPasswordRequest'
            example:
              context:
                id: "api.account.resetPassword"
                version: "1.0"
                ts: "2025-09-09T11:00:00Z"
                msg_id: "d1e2f3a4-b5c6-7890-1234-567890abcdef"
                developer_token: "dev_pk_..."
              payload:
                email: "alice.smith@example.com"
      responses:
        '200':
          description: "Password reset instructions sent."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_Success'
        '404':
          $ref: '#/components/responses/NotFoundError'

  /v1/account/get:
    post:
      tags:
        - "Account"
      summary: "Get current account profile"
      description: "Retrieves the full account profile for the authenticated end-user. Requires Developer + User auth."
      security:
        - developerToken: []
        - developerSignature: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApiRequest_Empty'
            example:
              context:
                id: "api.account.get"
                version: "1.0"
                ts: "2025-09-09T09:05:00Z"
                msg_id: "e1f2a3b4-c5d6-7890-1234-567890abcdef"
                developer_token: "dev_pk_..."
                authorization: "Bearer eyJ..."
              payload: {}
      responses:
        '200':
          description: "Account profile retrieved successfully."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_AccountProfile'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  # /v1/account/lookup:
