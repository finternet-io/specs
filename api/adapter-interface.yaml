  # -------------------- Error Responses --------------------
  responses:
    BadRequestError:
      description: "Invalid request parameters"
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ApiError' }
          example:
            context:
              id: "adapter.balance.get"
              version: "1.0"
              ts: "2026-02-17T10:00:01Z"
              msgId: "..."
              status: "failed"
              error:
                code: "INVALID_REQUEST"
                message: "Invalid address format for this chain"
            response: {}

    NotFoundError:
      description: "Resource not found"
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ApiError' }
          example:
            context:
              id: "adapter.transactions.status"
              version: "1.0"
              ts: "2026-02-17T10:00:01Z"
              msgId: "..."
              status: "failed"
              error:
                code: "NOT_FOUND"
                message: "Transaction not found"
            response: {}

    UpstreamUnavailableError:
      description: "Upstream chain RPC unavailable"
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ApiError' }
          example:
            context:
              id: "adapter.chain.info"
              version: "1.0"
              ts: "2026-02-17T10:00:01Z"
              msgId: "..."
              status: "failed"
              error:
                code: "UPSTREAM_UNAVAILABLE"
                message: "Chain RPC endpoint is not responding"
            response: {}
