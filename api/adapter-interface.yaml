                  value:
                    context:
                      id: "adapter.transactions.status"
                      version: "1.0"
                      ts: "2026-02-17T10:00:01Z"
                      msgId: "b4c5d6e7-f8a9-0123-4567-123456789012"
                      status: "successful"
                    response:
                      txHash: "0xabc123..."
                      chainId: "eip155:1"
                      status: "failed"
                      blockNumber: 19234567
                      failureReason: "execution reverted: ERC20: transfer amount exceeds balance"
