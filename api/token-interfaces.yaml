openapi: 3.0.4
info:
  title: "Finternet API - Token Service"
  description: |
    The official API specification for the Finternet Token (UNITS) service.

    This API enables creation, management, and lifecycle operations for universal tokens
    following the UNITS Token Specification.

    ### Protocol-Agnostic Envelope
    All API interactions use a standard JSON envelope.

    **Request Envelope:**
    ```json
    {
      "context": { ... },
      "payload": { ... },
      "signature": { ... } // Optional
    }
    ```

    **Response Envelope (Success):**
    ```json
    {
      "context": { ..., "status": "successful" },
      "response": { ... }
    }
    ```

    **Response Envelope (Error):**
    ```json
    {
      "context": { ..., "status": "failed", "error": {"code": "...", "message": "..." }},
      "response": {} // Empty on error
    }
    ```
    (Error details are in the context.error object)

    ### Authentication and Authorization
    This API uses the same two-level authorization model as the Account service:

    1.  **Platform-Level (Developer) Authentication:**
        * `context.developerToken`: The B2B Developer's API Key/Token.
        * `context.developerSignature`: The B2B Developer's signature (e.g., RFC 9421) of the payload.

    2.  **User-Level (End-User) Authorization:**
        * `context.authorization`: The end-user's JWT session token (for session-based calls).
        * `signature` (top-level): The end-user's JWS for critical, cryptographically-signed operations.

    *Note for HTTP Clients:* As a convenience, the `developerToken` may be provided in the standard `Authorization: Bearer <token>` HTTP header, and the `developerSignature` in an `X-Finternet-Signature` header.

    ### RBAC Scopes

    Every endpoint requires the caller's developer token to carry at least one of the
    listed scopes. A `*` (wildcard) scope satisfies any check. Calls that fail the scope
    check return `403 PERMISSION_DENIED`.

    | Endpoint | Required scope |
    |----------|----------------|
    | `POST /v1/registry/tokenclasses/register` | `tokenclasses:create` |
    | `POST /v1/registry/tokenclasses/update` | `tokenclasses:manage` |
    | `POST /v1/registry/tokenclasses/get` | `tokenclasses:view` |
    | `POST /v1/registry/tokenclasses/search` | `tokenclasses:view` |
    | `POST /v1/token/get` | `tokens:view` |
    | `POST /v1/token/mint` | `tokens:create` |
    | `POST /v1/token/search` | `tokens:view` |
    | `POST /v1/token/transact` | `tokens:transact` |
    | `POST /v1/token/transactions` | `transactions:view` |
    | `POST /v1/token/add` | `tokens:create` |
    | `POST /v1/transaction/status` | `transactions:view` |
    | `POST /v1/transaction/get` | `transactions:view` |
    | `POST /v1/transaction/search` | `transactions:view` |

    ### Rate limiting

    All endpoints are protected by a scope-tier sliding-window rate limiter. When the
    limit is exceeded the service responds with `429 Too Many Requests` and a
    `Retry-After` header indicating when the caller may retry. The shared
    `RateLimitedError` response component documents the body shape.
  version: "1.0.0"
servers:
  - url: "https://foundry.finternetlab.io"
    description: "Development Environment"
  - url: "http://localhost:3000"
    description: "Local Server"
tags:
  - name: "Token Classes"
    description: "Endpoints for token class registration and management."
  - name: "Token"
    description: "Endpoints for token creation, querying, and lifecycle management."
  - name: "Transaction"
    description: "Endpoints for transaction management."

# ===============================================================
#   PATHS
# ===============================================================

paths:
  # -------------------- TokenClass --------------------
  /v1/registry/tokenclasses/register:
    post:
      tags:
        - "Token Classes"
      summary: "Register new token class"
      description: |
        Register a new token class with schema definition and metadata.
        Only authorized administrators can register token classes.
      security:
        - developerToken: []
        - developerSignature: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApiRequest_RegisterTokenClassRequest'
            examples:
              USDC:
                summary: "Register USDC - Circle's USD stablecoin"
                value:
                  context:
                    id: "api.registry.tokenclasses.register"
                    version: "1.0"
                    ts: "2025-01-04T10:00:00Z"
                    msgId: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
                    developerToken: "dev_pk_..."
                    authorization: "Bearer eyJ..."
                  payload:
                    tokenClass: "USDC"
                    tokenStandard: "UNITS-FT"
                    name: "USD Coin"
                    description: "Circle USD stablecoin pegged 1:1 to USD"
                    status: "active"
                    schema:
                      type: "object"
                      properties:
                        supply:
                          type: "object"
                          properties:
                            total: { type: "string", pattern: "^[0-9]+$" }
                            circulating: { type: "string", pattern: "^[0-9]+$" }
                      required: ["supply"]
                    identities:
                      - id: "circle"
                        type: "issuer"
                        roles: ["admin", "minter", "burner"]
                    metadata:
                      decimals: 6
                      symbol: "USDC"
                      currency: "USD"
                      fungible: true
                      category: "stablecoin"
                    chainDeployments:
                      - chainId: "eip155:1"
                        contractAddress: "0xA0b86991c6218b36c1d19D4a2e9Eb0cE3606eB48"
                        assetType: "erc20"
                        decimals: 6
                      - chainId: "eip155:137"
                        contractAddress: "0x3c499c542cEF5E3811e1192ce70d8cC03d5c3359"
                        assetType: "erc20"
                        decimals: 6
                      - chainId: "eip155:8453"
                        contractAddress: "0x833589fCD6eDb6E08f4c7C32D4f71b54bdA02913"
                        assetType: "erc20"
                        decimals: 6
              USDT:
                summary: "Register USDT - Tether's USD stablecoin"
                value:
                  context:
                    id: "api.registry.tokenclasses.register"
                    version: "1.0"
                    ts: "2025-01-04T10:00:00Z"
                    msgId: "b2c3d4e5-f6a7-8901-2345-67890abcdef"
                    developerToken: "dev_pk_..."
                    authorization: "Bearer eyJ..."
                  payload:
                    tokenClass: "USDT"
                    tokenStandard: "UNITS-FT"
                    name: "Tether USD"
                    description: "Tether USD stablecoin"
                    schema:
                      type: "object"
                      properties:
                        supply:
                          type: "object"
                          properties:
                            total: { type: "string", pattern: "^[0-9]+$" }
                            circulating: { type: "string", pattern: "^[0-9]+$" }
                      required: ["supply"]
                    identities:
                      - id: "tether"
                        type: "issuer"
                        roles: ["admin", "minter", "burner"]
                    metadata:
                      decimals: 6
                      symbol: "USDT"
                      currency: "USD"
                      fungible: true
                      category: "stablecoin"
              EURC:
                summary: "Register EURC - Circle's Euro stablecoin"
                value:
                  context:
                    id: "api.registry.tokenclasses.register"
                    version: "1.0"
                    ts: "2025-01-04T10:00:00Z"
                    msgId: "c3d4e5f6-a7b8-9012-3456-7890abcdef"
                    developerToken: "dev_pk_..."
                    authorization: "Bearer eyJ..."
                  payload:
                    tokenClass: "EURC"
                    tokenStandard: "UNITS-FT"
                    name: "Euro Coin"
                    description: "Circle Euro stablecoin pegged 1:1 to EUR"
                    schema:
                      type: "object"
                      properties:
                        supply:
                          type: "object"
                          properties:
                            total: { type: "string", pattern: "^[0-9]+$" }
                            circulating: { type: "string", pattern: "^[0-9]+$" }
                      required: ["supply"]
                    identities:
                      - id: "circle-eu"
                        type: "issuer"
                        roles: ["admin", "minter", "burner"]
                    metadata:
                      decimals: 6
                      symbol: "EURC"
                      currency: "EUR"
                      fungible: true
                      category: "stablecoin"
              GBPT:
                summary: "Register GBPT - British Pound stablecoin"
                value:
                  context:
                    id: "api.registry.tokenclasses.register"
                    version: "1.0"
                    ts: "2025-01-04T10:00:00Z"
                    msgId: "d4e5f6a7-b8c9-0123-4567-890abcdef"
                    developerToken: "dev_pk_..."
                    authorization: "Bearer eyJ..."
                  payload:
                    tokenClass: "GBPT"
                    tokenStandard: "UNITS-FT"
                    name: "British Pound Token"
                    description: "Stablecoin pegged 1:1 to GBP"
                    schema:
                      type: "object"
                      properties:
                        supply:
                          type: "object"
                          properties:
                            total: { type: "string", pattern: "^[0-9]+$" }
                            circulating: { type: "string", pattern: "^[0-9]+$" }
                      required: ["supply"]
                    identities:
                      - id: "hsbc"
                        type: "issuer"
                        roles: ["admin", "minter", "burner"]
                    metadata:
                      decimals: 6
                      symbol: "GBPT"
                      currency: "GBP"
                      fungible: true
                      category: "stablecoin"
              INRT:
                summary: "Register INRT - Indian Rupee token"
                value:
                  context:
                    id: "api.registry.tokenclasses.register"
                    version: "1.0"
                    ts: "2025-01-04T10:00:00Z"
                    msgId: "e5f6a7b8-c9d0-1234-5678-90abcdef1"
                    developerToken: "dev_pk_..."
                    authorization: "Bearer eyJ..."
                  payload:
                    tokenClass: "INRT"
                    tokenStandard: "UNITS-FT"
                    name: "Indian Rupee Token"
                    description: "Stablecoin pegged 1:1 to INR"
                    schema:
                      type: "object"
                      properties:
                        supply:
                          type: "object"
                          properties:
                            total: { type: "string", pattern: "^[0-9]+$" }
                            circulating: { type: "string", pattern: "^[0-9]+$" }
                      required: ["supply"]
                    identities:
                      - id: "hdfc"
                        type: "issuer"
                        roles: ["admin", "minter", "burner"]
                    metadata:
                      decimals: 2
                      symbol: "INRT"
                      currency: "INR"
                      fungible: true
                      category: "stablecoin"
              NFH-T:
                summary: "Register NFH-T - Utility token with constraints"
                value:
                  context:
                    id: "api.registry.tokenclasses.register"
                    version: "1.0"
                    ts: "2025-01-04T10:00:00Z"
                    msgId: "f6a7b8c9-d0e1-2345-6789-0abcdef12"
                    developerToken: "dev_pk_..."
                    authorization: "Bearer eyJ..."
                  payload:
                    tokenClass: "NFH-T"
                    tokenStandard: "UNITS-FT"
                    name: "Network for Humanities Token"
                    description: "Utility token with max supply and min balance constraints"
                    schema:
                      type: "object"
                      properties:
                        supply:
                          type: "object"
                          properties:
                            total: { type: "string", pattern: "^[0-9]+$" }
                            circulating: { type: "string", pattern: "^[0-9]+$" }
                      required: ["supply"]
                    identities:
                      - id: "nfh"
                        type: "issuer"
                        roles: ["admin", "minter", "burner"]
                    metadata:
                      decimals: 2
                      symbol: "NFH"
                      fungible: true
                      category: "utility"
                      maxSupply: "10000000"
                      minBalance: "1000"
              ART-NFT:
                summary: "Register ART-NFT - Digital art collectibles"
                value:
                  context:
                    id: "api.registry.tokenclasses.register"
                    version: "1.0"
                    ts: "2025-01-04T10:00:00Z"
                    msgId: "a7b8c9d0-e1f2-3456-7890-abcdef123"
                    developerToken: "dev_pk_..."
                    authorization: "Bearer eyJ..."
                  payload:
                    tokenClass: "ART-NFT"
                    tokenStandard: "UNITS-NFT"
                    name: "Digital Art Collectible"
                    description: "NFT for unique digital artworks and collectibles"
                    schema:
                      type: "object"
                      properties:
                        tokenURI: { type: "string", format: "uri" }
                        attributes:
                          type: "array"
                          items:
                            type: "object"
                            properties:
                              trait_type: { type: "string" }
                              value: { type: ["string", "number"] }
                            required: ["trait_type", "value"]
                        creator: { type: "string" }
                        royaltyBps: { type: "integer", minimum: 0, maximum: 10000 }
                      required: ["tokenURI"]
                    identities:
                      - id: "opensea"
                        type: "issuer"
                        roles: ["admin", "minter"]
                    metadata:
                      symbol: "ART"
                      fungible: false
                      category: "collectible"
              RWA-NFT:
                summary: "Register RWA-NFT - Real world asset tokens"
                value:
                  context:
                    id: "api.registry.tokenclasses.register"
                    version: "1.0"
                    ts: "2025-01-04T10:00:00Z"
                    msgId: "b8c9d0e1-f2a3-4567-8901-bcdef1234"
                    developerToken: "dev_pk_..."
                    authorization: "Bearer eyJ..."
                  payload:
                    tokenClass: "RWA-NFT"
                    tokenStandard: "UNITS-NFT"
                    name: "Real World Asset Token"
                    description: "NFT for tokenized real-world assets like property deeds"
                    schema:
                      type: "object"
                      properties:
                        assetId: { type: "string", description: "External asset identifier" }
                        assetType: { type: "string", enum: ["property", "vehicle", "certificate", "document"] }
                        legalDocHash: { type: "string", pattern: "^[a-f0-9]{64}$", description: "SHA-256 hash of legal document" }
                        jurisdiction: { type: "string" }
                        valuationUSD: { type: "string", pattern: "^[0-9]+\\.?[0-9]*$" }
                      required: ["assetId", "assetType", "legalDocHash"]
                    identities:
                      - id: "realassets"
                        type: "issuer"
                        roles: ["admin", "minter", "compliance"]
                    metadata:
                      symbol: "RWA"
                      fungible: false
                      category: "real_world_asset"
                      requiresKYC: true
      responses:
        '201':
          description: "Token class registered successfully"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_TokenClassDetails'
              example:
                context:
                  id: "api.registry.tokenclasses.register"
                  version: "1.0"
                  ts: "2025-01-04T10:00:00Z"
                  msgId: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
                  status: "successful"
                response:
                  tokenClass: "USDC"
                  tokenStandard: "UNITS-FT"
                  name: "USD Coin"
                  description: "Circle USD stablecoin pegged 1:1 to USD"
                  status: "active"
                  schema:
                    type: "object"
                    properties:
                      supply:
                        type: "object"
                        properties:
                          total: { type: "string", pattern: "^[0-9]+$" }
                          circulating: { type: "string", pattern: "^[0-9]+$" }
                    required: ["supply"]
                  identities:
                    - id: "circle"
                      type: "issuer"
                      roles: ["admin", "minter", "burner"]
                  metadata:
                    decimals: 6
                    symbol: "USDC"
                    currency: "USD"
                    fungible: true
                    category: "stablecoin"
                    createdAt: "2025-01-04T10:00:00Z"
                    updatedAt: "2025-01-04T10:00:00Z"
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '409':
          description: "Token class already exists"

  /v1/registry/tokenclasses/update:
    post:
      tags:
        - "Token Classes"
      summary: "Update token class"
      description: |
        Update token class metadata, schema, or identities/roles.
        Can be used to add/remove authorized minters or update class properties.
      security:
        - developerToken: []
        - developerSignature: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApiRequest_UpdateTokenClassRequest'
            example:
              context:
                id: "api.registry.tokenclasses.update"
                version: "1.0"
                ts: "2025-01-04T11:00:00Z"
                msgId: "b2c3d4e5-f6a7-8901-2345-67890abcdef"
                developerToken: "dev_pk_..."
                authorization: "Bearer eyJ..."
              payload:
                tokenClass: "USDC"
                metadata:
                  tags:
                    category: "stablecoin"
                    compliance: "regulated"
                    issuer: "circle"
                    peg: "USD"
      responses:
        '200':
          description: "Token class updated successfully"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_TokenClassDetails'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'

  /v1/registry/tokenclasses/get:
    post:
      tags:
        - "Token Classes"
      summary: "Get token class details"
      description: "Retrieve detailed information about a specific token class"
      security:
        - developerToken: []
        - userToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApiRequest_GetTokenClassRequest'
            example:
              context:
                id: "api.registry.tokenclasses.get"
                version: "1.0"
                ts: "2025-01-04T10:00:00Z"
                msgId: "c3d4e5f6-a7b8-9012-3456-7890abcdef12"
                developerToken: "dev_pk_..."
                authorization: "Bearer eyJ..."
              payload:
                tokenClass: "USDC"
      responses:
        '200':
          description: "Token class details retrieved"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_TokenClassDetails'
              example:
                context:
                  id: "api.registry.tokenclasses.get"
                  version: "1.0"
                  ts: "2025-01-04T10:00:00Z"
                  msgId: "c3d4e5f6-a7b8-9012-3456-7890abcdef"
                  status: "successful"
                response:
                  tokenClass: "USDC"
                  tokenStandard: "UNITS-FT"
                  name: "USD Coin"
                  description: "Circle USD stablecoin pegged 1:1 to USD"
                  status: "active"
                  schema:
                    type: "object"
                    properties:
                      supply:
                        type: "object"
                        properties:
                          total: { type: "string", pattern: "^[0-9]+$" }
                          circulating: { type: "string", pattern: "^[0-9]+$" }
                    required: ["supply"]
                  identities:
                    - id: "circle"
                      type: "issuer"
                      roles: ["admin", "minter", "burner"]
                  metadata:
                    decimals: 6
                    symbol: "USDC"
                    currency: "USD"
                    fungible: true
                    category: "stablecoin"
                    createdAt: "2025-01-04T10:00:00Z"
                    updatedAt: "2025-01-04T10:00:00Z"
        '404':
          $ref: '#/components/responses/NotFoundError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /v1/registry/tokenclasses/search:
    post:
      tags:
        - "Token Classes"
      summary: "Search token classes"
      description: "Search and list all registered token classes with filters"
      security:
        - developerToken: []
        - userToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApiRequest_SearchTokenClassRequest'
            example:
              context:
                id: "api.registry.tokenclasses.search"
                version: "1.0"
                ts: "2025-01-04T10:00:00Z"
                msgId: "d4e5f6a7-b8c9-0123-4567-890abcdef123"
                developerToken: "dev_pk_..."
                authorization: "Bearer eyJ..."
              payload:
                filters:
                  tokenStandard: "ERC-3643"
                  category: "stablecoin"
                pagination:
                  limit: 50
                  offset: 0
                sortBy:
                  field: "createdAt"
                  order: "desc"
      responses:
        '200':
          description: "Token class list retrieved"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_TokenClassList'
              example:
                context:
                  id: "api.registry.tokenclasses.search"
                  version: "1.0"
                  ts: "2025-01-04T10:00:00Z"
                  msgId: "d4e5f6a7-b8c9-0123-4567-890abcdef"
                  status: "successful"
                response:
                  tokenClasses:
                    - tokenClass: "USDC"
                      tokenStandard: "UNITS-FT"
                      name: "USD Coin"
                      description: "Circle USD stablecoin pegged 1:1 to USD"
                      status: "active"
                      schema:
                        type: "object"
                        properties:
                          supply:
                            type: "object"
                            properties:
                              total: { type: "string", pattern: "^[0-9]+$" }
                              circulating: { type: "string", pattern: "^[0-9]+$" }
                        required: ["supply"]
                      identities:
                        - id: "circle"
                          type: "issuer"
                          roles: ["admin", "minter", "burner"]
                      metadata:
                        decimals: 6
                        symbol: "USDC"
                        currency: "USD"
                        fungible: true
                        category: "stablecoin"
                        createdAt: "2025-01-04T10:00:00Z"
                        updatedAt: "2025-01-04T10:00:00Z"
                    - tokenClass: "USDT"
                      tokenStandard: "UNITS-FT"
                      name: "Tether USD"
                      description: "Tether USD stablecoin"
                      status: "active"
                      schema:
                        type: "object"
                        properties:
                          supply:
                            type: "object"
                            properties:
                              total: { type: "string", pattern: "^[0-9]+$" }
                              circulating: { type: "string", pattern: "^[0-9]+$" }
                        required: ["supply"]
                      identities:
                        - id: "tether"
                          type: "issuer"
                          roles: ["admin", "minter", "burner"]
                      metadata:
                        decimals: 6
                        symbol: "USDT"
                        currency: "USD"
                        fungible: true
                        category: "stablecoin"
                        createdAt: "2025-01-04T10:00:00Z"
                        updatedAt: "2025-01-04T10:00:00Z"
                  pagination:
                    total: 2
                    limit: 50
                    offset: 0
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  # -------------------- Token --------------------
  /v1/token/get:
    post:
      tags:
        - "Token"
      summary: "Get token details"
      description: "Retrieves detailed information about a specific token by its ID. Requires Developer and User auth."
      security:
        - developerToken: []
        - userToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApiRequest_GetTokenRequest'
            examples:
              raw_get:
                summary: "Get token — raw mode (default)"
                value:
                  context:
                    id: "api.token.get"
                    version: "1.0"
                    ts: "2025-01-04T10:00:00Z"
                    msgId: "a1b2c3d4-e5f6-7890-1234-567890abcdef"
                    developerToken: "dev_pk_..."
                    authorization: "Bearer eyJ..."
                  payload:
                    tokenId: "urn:uuid:a1b2c3d4-e5f6-7890-abcd-1234567890ab"
              display_get:
                summary: "Get token — display mode (human-readable)"
                value:
                  context:
                    id: "api.token.get"
                    version: "1.0"
                    ts: "2025-01-04T10:00:00Z"
                    msgId: "a1b2c3d4-e5f6-7890-1234-567890abcdf0"
                    developerToken: "dev_pk_..."
                    authorization: "Bearer eyJ..."
                    valueFormat: "display"
                  payload:
                    tokenId: "urn:uuid:a1b2c3d4-e5f6-7890-abcd-1234567890ab"
      responses:
        '200':
          description: "Token details retrieved successfully."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_TokenDetails'
              examples:
                raw_token:
                  summary: "Token response — raw (smallest-unit integers)"
                  value:
                    context:
                      id: "api.token.get"
                      version: "1.0"
                      ts: "2025-01-04T10:00:01Z"
                      msgId: "a1b2c3d4-e5f6-7890-1234-567890abcdef"
