openapi: 3.1.0
info:
  title: Finternet Credential Token Schema v1
  version: 1.0.0
  description: |
    Credential Token schema extending the UNITS Token Specification with W3C Verifiable Credentials
    compliance. Used to tokenize identity verification results, KYC attestations, and other
    verifiable claims from third-party providers like Signzy, Onfido, Jumio, etc.

    ## W3C Verifiable Credentials Compliance

    This schema is fully compliant with:
    - W3C Verifiable Credentials Data Model 1.1 (https://www.w3.org/TR/vc-data-model/)
    - W3C Verifiable Credentials Data Model 2.0 (https://www.w3.org/TR/vc-data-model-2.0/)
    - W3C DID Core 1.0 (https://www.w3.org/TR/did-core/)

    ## Extension Properties

    Finternet-specific extensions are namespaced under `finternet:` and include:
    - Provider metadata (journeyId, flowId, flowVersion)
    - Raw response storage (encrypted reference and hash)
    - Verification level (basic, standard, enhanced, premium)
    - Document and biometric verification details

components:
  schemas:
    # -------------------- W3C VC Standard Types --------------------

    VerifiableCredential:
      type: object
      description: |
        W3C Verifiable Credential base type. All credential tokens include this as
        a claim within the UNITS structure.
      x-jsonld:
        "@context": https://www.w3.org/2018/credentials/v1
        "@type": VerifiableCredential
      required:
        - "@context"
        - type
        - issuer
        - issuanceDate
        - credentialSubject
      properties:
        "@context":
          oneOf:
            - type: string
            - type: array
              items:
                oneOf:
                  - type: string
                  - type: object
          description: |
            JSON-LD context(s). MUST include "https://www.w3.org/2018/credentials/v1"
            as the first context. Additional contexts can extend with domain-specific terms.
          examples:
            - ["https://www.w3.org/2018/credentials/v1", "https://finternet-io.github.io/specs/schemas/credential/v1/context.jsonld"]
        id:
          type: string
          format: uri
          description: Unique identifier for this credential (URN or URL)
          x-jsonld: { "@id": "@id", "@type": "@id" }
        type:
          oneOf:
            - type: string
            - type: array
              items:
                type: string
          description: |
            Credential types. MUST include "VerifiableCredential". Additional types
            specify the credential category (e.g., "IdentityCredential", "KYCCredential").
          x-jsonld: { "@id": "@type", "@type": "@vocab" }
        issuer:
          oneOf:
            - type: string
              format: uri-reference
            - type: object
              properties:
                id:
                  type: string
                  format: uri-reference
                name:
                  type: string
          description: |
            DID or URI of the credential issuer. Can be a simple DID string or an
            object with additional issuer metadata.
          x-jsonld: { "@id": "https://www.w3.org/2018/credentials#issuer", "@type": "@id" }
        issuanceDate:
          type: string
          format: date-time
          description: Date and time when the credential was issued (W3C VC 1.1)
          x-jsonld: { "@id": "https://www.w3.org/2018/credentials#issuanceDate", "@type": "xsd:dateTime" }
        validFrom:
          type: string
          format: date-time
          description: Date and time from which the credential is valid (W3C VC 2.0)
          x-jsonld: { "@id": "https://www.w3.org/2018/credentials#validFrom", "@type": "xsd:dateTime" }
        expirationDate:
          type: string
          format: date-time
          description: Date and time when the credential expires (W3C VC 1.1)
          x-jsonld: { "@id": "https://www.w3.org/2018/credentials#expirationDate", "@type": "xsd:dateTime" }
        validUntil:
          type: string
          format: date-time
          description: Date and time until which the credential is valid (W3C VC 2.0)
          x-jsonld: { "@id": "https://www.w3.org/2018/credentials#validUntil", "@type": "xsd:dateTime" }
        credentialSubject:
          $ref: "#/components/schemas/CredentialSubject"
        credentialStatus:
          $ref: "#/components/schemas/CredentialStatus"
        credentialSchema:
          $ref: "#/components/schemas/CredentialSchema"
        evidence:
          type: array
          items:
            $ref: "#/components/schemas/Evidence"
          description: Evidence supporting the credential claims
          x-jsonld: { "@id": "https://www.w3.org/2018/credentials#evidence", "@container": "@set" }
        termsOfUse:
          type: array
          items:
            $ref: "#/components/schemas/TermsOfUse"
          description: Terms of use for the credential
          x-jsonld: { "@id": "https://www.w3.org/2018/credentials#termsOfUse", "@container": "@set" }
        refreshService:
          $ref: "#/components/schemas/RefreshService"
        proof:
          oneOf:
            - $ref: "#/components/schemas/Proof"
            - type: array
              items:
                $ref: "#/components/schemas/Proof"
          description: Cryptographic proof(s) for the credential

    CredentialSubject:
      type: object
      description: |
        The entity that the credential makes claims about. For identity credentials,
        this contains the verified identity information.
      required:
        - id
      properties:
        id:
          type: string
          format: uri-reference
          description: DID or URI of the credential subject
          x-jsonld: { "@id": "@id", "@type": "@id" }
      additionalProperties: true
      x-jsonld: { "@id": "https://www.w3.org/2018/credentials#credentialSubject" }

    CredentialStatus:
      type: object
      description: |
        Information for checking credential revocation status.
        Supports multiple status list types per W3C VC spec.
      required:
        - id
        - type
      properties:
        id:
          type: string
          format: uri
          description: URI to check credential status
          x-jsonld: { "@id": "@id", "@type": "@id" }
        type:
          type: string
          description: Type of status check mechanism
          enum:
            - StatusList2021Entry
            - RevocationList2020Status
            - BitstringStatusListEntry
          x-jsonld: { "@id": "@type" }
        statusPurpose:
          type: string
          description: Purpose of the status entry
          enum:
            - revocation
            - suspension
        statusListIndex:
          type: string
          description: Index in the status list
        statusListCredential:
          type: string
          format: uri
          description: URI of the status list credential
      x-jsonld: { "@id": "https://www.w3.org/2018/credentials#credentialStatus" }

    CredentialSchema:
      type: object
      description: Schema that the credential conforms to
      required:
        - id
        - type
      properties:
        id:
          type: string
          format: uri
          description: URI of the schema
          x-jsonld: { "@id": "@id", "@type": "@id" }
        type:
          type: string
          description: Type of schema
          enum:
            - JsonSchema
            - JsonSchemaCredential
          x-jsonld: { "@id": "@type" }
      x-jsonld: { "@id": "https://www.w3.org/2018/credentials#credentialSchema" }

    Evidence:
      type: object
      description: |
        W3C VC Evidence type for supporting verification claims.
        Extended by IdentityEvidence for KYC-specific evidence.
      properties:
        id:
          type: string
          format: uri
          description: Identifier for this evidence
          x-jsonld: { "@id": "@id", "@type": "@id" }
        type:
          oneOf:
            - type: string
            - type: array
              items:
                type: string
          description: Evidence type(s)
          x-jsonld: { "@id": "@type", "@type": "@vocab" }
      additionalProperties: true
      x-jsonld: { "@id": "https://www.w3.org/2018/credentials#evidence" }

    TermsOfUse:
      type: object
      description: Terms governing how the credential can be used
      properties:
        id:
          type: string
          format: uri
          x-jsonld: { "@id": "@id", "@type": "@id" }
        type:
          type: string
          x-jsonld: { "@id": "@type" }
        profile:
          type: string
          format: uri
        prohibition:
          type: array
          items:
            type: object
        permission:
          type: array
          items:
            type: object
      x-jsonld: { "@id": "https://www.w3.org/2018/credentials#termsOfUse" }

    RefreshService:
      type: object
      description: Service for refreshing the credential
      required:
        - id
        - type
      properties:
        id:
          type: string
          format: uri
          x-jsonld: { "@id": "@id", "@type": "@id" }
        type:
          type: string
          x-jsonld: { "@id": "@type" }
      x-jsonld: { "@id": "https://www.w3.org/2018/credentials#refreshService" }

    Proof:
      type: object
      description: Cryptographic proof for a verifiable credential
      x-jsonld:
        "@context": https://w3id.org/security/v2
        "@type": sec:Proof
      required:
        - type
        - created
        - verificationMethod
        - proofPurpose
      properties:
        type:
          type: string
          description: |
            Proof type. Common types include:
            - Ed25519Signature2020
            - JsonWebSignature2020
            - DataIntegrityProof
          x-jsonld: { "@id": "@type" }
        created:
          type: string
          format: date-time
          description: Proof creation timestamp
          x-jsonld: { "@id": "https://w3id.org/security#created", "@type": "xsd:dateTime" }
        verificationMethod:
          type: string
          format: uri
          description: URI of the verification method (public key)
          x-jsonld: { "@id": "https://w3id.org/security#verificationMethod", "@type": "@id" }
        proofPurpose:
          type: string
          description: Purpose of the proof
          enum:
            - assertionMethod
            - authentication
            - keyAgreement
            - capabilityInvocation
            - capabilityDelegation
          x-jsonld: { "@id": "https://w3id.org/security#proofPurpose" }
        proofValue:
          type: string
          description: Multibase-encoded proof value (VC 2.0)
          x-jsonld: { "@id": "https://w3id.org/security#proofValue" }
        jws:
          type: string
          description: Compact JWS signature (VC 1.1)
          x-jsonld: { "@id": "https://w3id.org/security#jws" }
        challenge:
          type: string
          description: Challenge used in the proof
          x-jsonld: { "@id": "https://w3id.org/security#challenge" }
        domain:
          type: string
          description: Domain the proof is valid for
          x-jsonld: { "@id": "https://w3id.org/security#domain" }
        cryptosuite:
          type: string
          description: Cryptographic suite used (VC 2.0 Data Integrity)
          x-jsonld: { "@id": "https://w3id.org/security#cryptosuite" }

    # -------------------- Finternet Credential Extensions --------------------

    CredentialType:
      type: string
      description: Type of credential verification performed
      enum:
        - identityVerification
        - documentVerification
        - biometricVerification
        - kycVerification
        - addressVerification
        - ageVerification
      x-jsonld: { "@id": "finternet:credentialType", "@type": "@vocab" }

    VerificationLevel:
      type: string
      description: |
        Level of assurance for the verification, aligned with eIDAS levels:
        - basic: Self-attestation or minimal checks
        - standard: Document OCR and validation
        - enhanced: Liveness + face matching
        - premium: Government DB checks + manual review
      enum:
        - basic
        - standard
        - enhanced
        - premium
      x-jsonld: { "@id": "finternet:verificationLevel", "@type": "@vocab" }

    ProviderType:
      type: string
      description: Type of verification provider
      enum:
        - kycProvider
        - documentProvider
        - biometricProvider
      x-jsonld: { "@id": "finternet:providerType", "@type": "@vocab" }

    VerificationProvider:
      type: object
      description: |
        Metadata about the third-party verification provider.
        Finternet extension for tracking provider-specific details.
      x-jsonld:
        "@context": https://finternet-io.github.io/specs/schemas/credential/v1/context.jsonld
        "@type": finternet:VerificationProvider
      required:
        - providerName
        - providerId
      properties:
        providerName:
          type: string
          description: Human-readable provider name
          x-jsonld: { "@id": "finternet:providerName" }
          examples:
            - Signzy
            - Onfido
            - Jumio
            - Hyperverge
        providerId:
          type: string
          description: Unique provider identifier
          x-jsonld: { "@id": "finternet:providerId" }
        providerType:
          $ref: "#/components/schemas/ProviderType"
        journeyId:
          type: string
          description: Provider's session/journey identifier
          x-jsonld: { "@id": "finternet:journeyId" }
        flowId:
          type: string
          format: uuid
          description: Provider's workflow/flow identifier
          x-jsonld: { "@id": "finternet:flowId" }
        flowVersion:
          type: integer
          description: Version of the verification flow
          x-jsonld: { "@id": "finternet:flowVersion", "@type": "xsd:integer" }
        rawResponseRef:
          type: string
          format: uri
          description: |
            Reference to encrypted raw provider response stored externally.
            The raw response contains all data returned by the provider.
          x-jsonld: { "@id": "finternet:rawResponseRef", "@type": "@id" }
        rawResponseHash:
          type: string
          description: SHA-256 hash of the raw response for integrity verification
          pattern: "^[a-f0-9]{64}$"
          x-jsonld: { "@id": "finternet:rawResponseHash" }
        encryptionKeyRef:
          type: string
          format: uri
          description: Reference to the key used to encrypt the raw response
          x-jsonld: { "@id": "finternet:encryptionKeyRef", "@type": "@id" }

    DocumentType:
      type: string
      description: Type of identity document
      enum:
        - passport
        - nationalId
        - driversLicense
        - pan
        - aadhaar
        - voterId
      x-jsonld: { "@id": "finternet:documentType", "@type": "@vocab" }

    VerificationMethod:
      type: string
      description: Method used to verify a document
      enum:
        - optical
        - ocr
        - nfc
        - api
        - manual
      x-jsonld: { "@id": "finternet:verificationMethod", "@type": "@vocab" }

    DocumentVerification:
      type: object
      description: Results of document verification
      x-jsonld:
        "@context": https://finternet-io.github.io/specs/schemas/credential/v1/context.jsonld
        "@type": finternet:DocumentVerification
      required:
        - documentType
        - documentCountry
        - documentValid
      properties:
        documentType:
          $ref: "#/components/schemas/DocumentType"
        documentCountry:
          type: string
          description: ISO 3166-1 alpha-2 country code
          pattern: "^[A-Z]{2}$"
          x-jsonld: { "@id": "finternet:documentCountry" }
        documentNumber:
          type: string
          description: Masked document number (last 4 chars visible)
          x-jsonld: { "@id": "finternet:documentNumber" }
        documentExpiry:
          type: string
          format: date
          description: Document expiration date
          x-jsonld: { "@id": "finternet:documentExpiry", "@type": "xsd:date" }
        documentValid:
          type: boolean
          description: Whether document passed all checks
          x-jsonld: { "@id": "finternet:documentValid", "@type": "xsd:boolean" }
        verificationMethod:
          $ref: "#/components/schemas/VerificationMethod"
        verificationAttempts:
          type: integer
          description: Number of verification attempts
          minimum: 1
          x-jsonld: { "@id": "finternet:verificationAttempts", "@type": "xsd:integer" }

    BiometricVerification:
      type: object
      description: Results of biometric verification (liveness, face match)
      x-jsonld:
        "@context": https://finternet-io.github.io/specs/schemas/credential/v1/context.jsonld
        "@type": finternet:BiometricVerification
      properties:
        livenessScore:
          type: number
          format: double
          description: Liveness confidence score (0.0 to 1.0)
          minimum: 0.0
          maximum: 1.0
          x-jsonld: { "@id": "finternet:livenessScore", "@type": "xsd:decimal" }
        livenessVerified:
          type: boolean
          description: Whether liveness check passed
          x-jsonld: { "@id": "finternet:livenessVerified", "@type": "xsd:boolean" }
        faceMatchScore:
          type: number
          format: double
          description: Face match confidence score (0.0 to 1.0)
          minimum: 0.0
          maximum: 1.0
          x-jsonld: { "@id": "finternet:faceMatchScore", "@type": "xsd:decimal" }
        faceMatchVerified:
          type: boolean
          description: Whether face match check passed
          x-jsonld: { "@id": "finternet:faceMatchVerified", "@type": "xsd:boolean" }
        verificationAttempts:
          type: integer
          description: Number of biometric verification attempts
          minimum: 1
          x-jsonld: { "@id": "finternet:verificationAttempts", "@type": "xsd:integer" }

    IdentityEvidence:
      type: object
      description: |
        W3C VC Evidence extension for identity verification.
        Contains document and biometric verification results.
      allOf:
        - $ref: "#/components/schemas/Evidence"
        - type: object
          x-jsonld:
            "@context": https://finternet-io.github.io/specs/schemas/credential/v1/context.jsonld
            "@type": finternet:IdentityEvidence
          properties:
            type:
              type: array
              items:
                type: string
              default: ["IdentityEvidence"]
            documentVerification:
              $ref: "#/components/schemas/DocumentVerification"
            biometricVerification:
              $ref: "#/components/schemas/BiometricVerification"
            verificationTimestamp:
              type: string
              format: date-time
              description: When the verification was completed
              x-jsonld: { "@id": "finternet:verificationTimestamp", "@type": "xsd:dateTime" }

    # -------------------- Identity Credential Subject Types --------------------

    PersonCredentialSubject:
      type: object
      description: Credential subject for a verified person
      allOf:
        - $ref: "#/components/schemas/CredentialSubject"
        - type: object
          properties:
            fullName:
              type: string
              description: Full legal name as on document
              x-jsonld: { "@id": "schema:name" }
            givenName:
              type: string
              description: Given/first name
              x-jsonld: { "@id": "schema:givenName" }
            familyName:
              type: string
              description: Family/last name
              x-jsonld: { "@id": "schema:familyName" }
            dateOfBirth:
              type: string
              format: date
              description: Date of birth
              x-jsonld: { "@id": "schema:birthDate", "@type": "xsd:date" }
            gender:
              type: string
              description: Gender as on document
              x-jsonld: { "@id": "schema:gender" }
            nationality:
              type: string
              description: Nationality/citizenship
              x-jsonld: { "@id": "schema:nationality" }
            address:
              $ref: "#/components/schemas/PostalAddress"

    PostalAddress:
      type: object
      description: Postal address following schema.org PostalAddress
      x-jsonld:
        "@type": schema:PostalAddress
      properties:
        streetAddress:
          type: string
          x-jsonld: { "@id": "schema:streetAddress" }
        addressLocality:
          type: string
          description: City/town
          x-jsonld: { "@id": "schema:addressLocality" }
        addressRegion:
          type: string
          description: State/province
          x-jsonld: { "@id": "schema:addressRegion" }
        postalCode:
          type: string
          x-jsonld: { "@id": "schema:postalCode" }
        addressCountry:
          type: string
          description: ISO 3166-1 alpha-2 country code
          x-jsonld: { "@id": "schema:addressCountry" }

    # -------------------- Credential Token (UNITS Extension) --------------------

    CredentialToken:
      type: object
      description: |
        A Credential Token (UNITS-CREDENTIAL) representing a verifiable credential.
        Extends NonFungibleToken with W3C VC compliance.

        Credentials are SOULBOUND NFTs:
        - balance: Always "1"
        - decimals: 0
        - transferable: false (cannot be transferred to another holder)
        - divisible: false (cannot be split)

        This ensures credentials remain bound to their original subject.
      x-jsonld:
        "@context": https://finternet-io.github.io/specs/schemas/credential/v1/context.jsonld
        "@type": finternet:CredentialToken
      required:
        - id
        - metadata
        - claims
        - identities
        - state
      properties:
        id:
          type: string
          format: uri
          description: Unique token identifier
          x-jsonld: { "@id": "@id", "@type": "@id" }
        metadata:
          $ref: "#/components/schemas/CredentialMetadata"
        data:
          type: object
          description: Additional credential-specific data
          additionalProperties: true
          x-jsonld: { "@id": "finternet:data", "@type": "@json" }
        claims:
          type: array
          items:
            $ref: "#/components/schemas/VerifiableCredential"
          description: The verifiable credential(s) this token represents
          minItems: 1
          x-jsonld: { "@id": "finternet:claims", "@type": "@id", "@container": "@set" }
        identities:
          type: array
          items:
            $ref: "#/components/schemas/CredentialIdentity"
          description: Identity relationships for the credential token
          x-jsonld: { "@id": "finternet:identities", "@type": "@id", "@container": "@set" }
        state:
          $ref: "#/components/schemas/CredentialState"

    CredentialMetadata:
      type: object
      description: |
        Metadata for a credential token. Credentials extend NonFungibleToken and are SOULBOUND:
        - fungibility: nonFungible (unique to subject)
        - decimals: 0 (not divisible)
        - transferable: false (cannot transfer to another holder)
        - divisible: false (cannot split)
      x-jsonld:
        "@context": https://finternet-io.github.io/specs/schemas/credential/v1/context.jsonld
        "@type": finternet:CredentialMetadata
      required:
        - tokenStandard
        - name
        - credentialType
        - verificationLevel
      properties:
        tokenStandard:
          type: array
          description: |
            Token standards for credentials. Must include a soulbound token standard as primary.
            Convention: First = primary (e.g., "UNITS-SBT"), rest = compatible/exportable.
          items:
            type: string
          minItems: 1
          contains:
            enum: ["UNITS-SBT", "UNITS-CREDENTIAL"]
          examples:
            - ["UNITS-SBT"]
            - ["UNITS-SBT", "W3C-VC-2.0"]
            - ["UNITS-SBT", "W3C-VC-2.0", "ERC-6239"]
          x-jsonld: { "@id": "finternet:tokenStandard", "@container": "@list" }
        name:
          type: string
          description: Human-readable credential name
          x-jsonld: { "@id": "schema:name" }
        symbol:
          type: string
          description: Short identifier (e.g., "KYC", "ID")
          x-jsonld: { "@id": "finternet:symbol" }
        fungibility:
          type: string
          description: Always "nonFungible" - credentials are unique to their subject
          const: nonFungible
          x-jsonld: { "@id": "finternet:fungibility", "@type": "@vocab" }
        decimals:
          type: integer
          description: Always 0 for credentials (NFTs have no decimal places)
          const: 0
          x-jsonld: { "@id": "finternet:decimals", "@type": "xsd:integer" }
        credentialType:
          $ref: "#/components/schemas/CredentialType"
        verificationLevel:
          $ref: "#/components/schemas/VerificationLevel"
        provider:
          $ref: "#/components/schemas/VerificationProvider"
        consentGiven:
          type: boolean
          description: Whether subject consented to verification
          x-jsonld: { "@id": "finternet:consentGiven", "@type": "xsd:boolean" }
        consentTimestamp:
          type: string
          format: date-time
          description: When consent was recorded
          x-jsonld: { "@id": "finternet:consentTimestamp", "@type": "xsd:dateTime" }
        version:
          type: string
          description: Credential schema version
          default: "1.0.0"
          x-jsonld: { "@id": "schema:version" }
        status:
          type: string
          description: Metadata-level status
          enum:
            - active
            - inactive
            - deprecated
          x-jsonld: { "@id": "finternet:metadataStatus", "@type": "@vocab" }
        flags:
          type: object
          description: |
            Behavioral flags for credentials. Credentials are SOULBOUND NFTs:
            - transferable: false (cannot transfer to another holder)
            - divisible: false (cannot split)
            - revocable: true (issuer can revoke)
          properties:
            transferable:
              type: boolean
              const: false
              description: Credentials are SOULBOUND - cannot be transferred to another holder
            divisible:
              type: boolean
              const: false
              description: Credentials cannot be split (NFT characteristic)
            revocable:
              type: boolean
              default: true
              description: Issuer can revoke the credential
            burnable:
              type: boolean
              default: false
              description: Whether the holder can burn (destroy) the credential
        description:
          type: string
          description: Human-readable description
          x-jsonld: { "@id": "schema:description" }
        createdAt:
          type: string
          format: date-time
          x-jsonld: { "@id": "schema:dateCreated", "@type": "xsd:dateTime" }
        updatedAt:
          type: string
          format: date-time
          x-jsonld: { "@id": "schema:dateModified", "@type": "xsd:dateTime" }

    CredentialIdentity:
      type: object
      description: Identity relationship for credential tokens
      required:
        - id
        - type
      properties:
        id:
          type: string
          format: uri-reference
          description: DID or URI of the identity
          x-jsonld: { "@id": "@id", "@type": "@id" }
        type:
          type: string
          description: Role in the credential
          enum:
            - issuer
            - subject
            - holder
            - verifier
          x-jsonld: { "@id": "finternet:identityType", "@type": "@vocab" }

    CredentialState:
      type: object
      description: |
        Runtime state for credential tokens.
        Extends TokenState from NonFungibleToken with balance always "1".
      x-jsonld:
        "@context": https://finternet-io.github.io/specs/schemas/credential/v1/context.jsonld
        "@type": finternet:CredentialState
      required:
        - status
        - balance
      properties:
        status:
          type: string
          description: Current credential status
          enum:
            - active
            - suspended
            - revoked
            - expired
          x-jsonld: { "@id": "finternet:lifecycleStatus", "@type": "@vocab" }
        balance:
          type: string
          const: "1"
          description: Credentials always have balance of exactly 1 (NFT characteristic)
          x-jsonld: { "@id": "finternet:balance" }
        effectiveFrom:
          type: string
          format: date-time
          description: When the credential became effective
          x-jsonld: { "@id": "finternet:effectiveFrom", "@type": "xsd:dateTime" }
        effectiveUntil:
          type: string
          format: date-time
          description: When the credential expires
          x-jsonld: { "@id": "finternet:effectiveUntil", "@type": "xsd:dateTime" }
        verificationAttempts:
          type: integer
          description: Total verification attempts for this credential
          x-jsonld: { "@id": "finternet:verificationAttempts", "@type": "xsd:integer" }
        customState:
          type: object
          description: Credential-specific state data
          additionalProperties: true
          x-jsonld: { "@id": "finternet:customState", "@type": "@json" }
        stateCommitment:
          type: string
          description: Hash/commitment representing this state
          x-jsonld: { "@id": "finternet:stateCommitment" }
