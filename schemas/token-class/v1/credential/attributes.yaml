openapi: 3.1.0
info:
  title: Finternet CredentialTokenClass Schema v1
  version: 1.0.0
  description: |
    CredentialTokenClass (UNITS-SBT) - Token class for soulbound credential tokens.

    ## Characteristics

    - **decimals**: 0 (credentials are atomic)
    - **divisible**: false (cannot split a credential)
    - **transferable**: false (soulbound - cannot be transferred)
    - **burnable**: false (holder cannot destroy, only issuer can revoke)
    - **revocable**: true (issuer can revoke)
    - **claims**: W3C Verifiable Credentials array

    ## W3C VC Compliance

    This schema is compliant with:
    - W3C Verifiable Credentials Data Model 1.1/2.0
    - W3C DID Core 1.0

    ## Provider Agnostic

    This schema is provider-agnostic. Mappings from specific KYC providers
    (Signzy, Onfido, Jumio, etc.) should be maintained separately.

components:
  schemas:
    # -------------------- Credential-Specific Types --------------------

    CredentialType:
      type: string
      description: Type of credential verification
      enum:
        - identityVerification
        - documentVerification
        - biometricVerification
        - kycVerification
        - addressVerification
        - ageVerification
      x-jsonld: { "@id": "finternet:credentialType", "@type": "@vocab" }

    VerificationLevel:
      type: string
      description: Level of assurance (aligned with eIDAS)
      enum:
        - basic
        - standard
        - enhanced
        - premium
      x-jsonld: { "@id": "finternet:verificationLevel", "@type": "@vocab" }

    DocumentType:
      type: string
      description: Type of identity document
      enum:
        - passport
        - nationalId
        - driversLicense
        - pan
        - aadhaar
        - voterId
      x-jsonld: { "@id": "finternet:documentType", "@type": "@vocab" }

    # -------------------- W3C VC Evidence Types --------------------

    DocumentVerification:
      type: object
      description: Document verification evidence
      x-jsonld:
        "@context": https://finternet-io.github.io/specs/schemas/token-class/v1/credential/context.jsonld
        "@type": finternet:DocumentVerification
      properties:
        documentType:
          $ref: "#/components/schemas/DocumentType"
        documentCountry:
          type: string
          description: ISO 3166-1 alpha-2 country code
          x-jsonld: { "@id": "finternet:documentCountry" }
        documentValid:
          type: boolean
          description: Whether document passed validation
          x-jsonld: { "@id": "finternet:documentValid", "@type": "xsd:boolean" }
        documentNumber:
          type: string
          description: Masked/partial document number for reference
          x-jsonld: { "@id": "finternet:documentNumber" }
        expiryDate:
          type: string
          format: date
          description: Document expiry date
          x-jsonld: { "@id": "finternet:documentExpiryDate", "@type": "xsd:date" }

    BiometricVerification:
      type: object
      description: Biometric verification evidence
      x-jsonld:
        "@context": https://finternet-io.github.io/specs/schemas/token-class/v1/credential/context.jsonld
        "@type": finternet:BiometricVerification
      properties:
        livenessVerified:
          type: boolean
          description: Whether liveness check passed
          x-jsonld: { "@id": "finternet:livenessVerified", "@type": "xsd:boolean" }
        livenessScore:
          type: number
          format: float
          minimum: 0
          maximum: 1
          description: Liveness confidence score (0-1)
          x-jsonld: { "@id": "finternet:livenessScore", "@type": "xsd:decimal" }
        faceMatchVerified:
          type: boolean
          description: Whether face match check passed
          x-jsonld: { "@id": "finternet:faceMatchVerified", "@type": "xsd:boolean" }
        faceMatchScore:
          type: number
          format: float
          minimum: 0
          maximum: 1
          description: Face match confidence score (0-1)
          x-jsonld: { "@id": "finternet:faceMatchScore", "@type": "xsd:decimal" }

    IdentityEvidence:
      type: object
      description: W3C VC Evidence extension for identity verification
      x-jsonld:
        "@context": https://finternet-io.github.io/specs/schemas/token-class/v1/credential/context.jsonld
        "@type": finternet:IdentityEvidence
      properties:
        type:
          oneOf:
            - type: string
            - type: array
              items:
                type: string
          description: Evidence type (always includes "IdentityEvidence")
          x-jsonld: { "@id": "@type" }
        documentVerification:
          $ref: "#/components/schemas/DocumentVerification"
        biometricVerification:
          $ref: "#/components/schemas/BiometricVerification"
        verificationDate:
          type: string
          format: date-time
          description: When verification was performed
          x-jsonld: { "@id": "finternet:verificationDate", "@type": "xsd:dateTime" }

    # -------------------- W3C Verifiable Credential --------------------

    VerifiableCredential:
      type: object
      description: W3C Verifiable Credential (embedded in claims array)
      x-jsonld:
        "@context": https://www.w3.org/2018/credentials/v1
        "@type": vc:VerifiableCredential
      required:
        - "@context"
        - type
        - issuer
        - credentialSubject
      properties:
        "@context":
          oneOf:
            - type: string
            - type: array
              items:
                type: string
          description: JSON-LD context (must include W3C VC context)
        id:
          type: string
          format: uri
          description: Unique identifier for this credential
          x-jsonld: { "@id": "@id", "@type": "@id" }
        type:
          oneOf:
            - type: string
            - type: array
              items:
                type: string
          description: Credential types (must include "VerifiableCredential")
          x-jsonld: { "@id": "@type" }
        issuer:
          oneOf:
            - type: string
              format: uri
            - type: object
              properties:
                id:
                  type: string
                  format: uri
          description: DID or URI of credential issuer
          x-jsonld: { "@id": "vc:issuer", "@type": "@id" }
        issuanceDate:
          type: string
          format: date-time
          description: When credential was issued (W3C VC 1.1)
          x-jsonld: { "@id": "vc:issuanceDate", "@type": "xsd:dateTime" }
        expirationDate:
          type: string
          format: date-time
          description: When credential expires (W3C VC 1.1, deprecated in 2.0)
          x-jsonld: { "@id": "vc:expirationDate", "@type": "xsd:dateTime" }
        validFrom:
          type: string
          format: date-time
          description: Start of validity period (W3C VC 2.0)
          x-jsonld: { "@id": "vc:validFrom", "@type": "xsd:dateTime" }
        validUntil:
          type: string
          format: date-time
          description: End of validity period (W3C VC 2.0)
          x-jsonld: { "@id": "vc:validUntil", "@type": "xsd:dateTime" }
        credentialSubject:
          type: object
          description: Subject of the credential
          required:
            - id
          properties:
            id:
              type: string
              format: uri
              description: DID or identifier of subject
          additionalProperties: true
          x-jsonld: { "@id": "vc:credentialSubject" }
        credentialStatus:
          type: object
          description: Revocation check endpoint
          properties:
            id:
              type: string
              format: uri
            type:
              type: string
          x-jsonld: { "@id": "vc:credentialStatus" }
        credentialSchema:
          type: object
          description: Schema for validation
          properties:
            id:
              type: string
              format: uri
            type:
              type: string
          x-jsonld: { "@id": "vc:credentialSchema" }
        evidence:
          type: array
          items:
            $ref: "#/components/schemas/IdentityEvidence"
          description: Supporting evidence for the credential
          x-jsonld: { "@id": "vc:evidence", "@container": "@set" }
        proof:
          type: object
          description: Cryptographic proof
          properties:
            type:
              type: string
            created:
              type: string
              format: date-time
            verificationMethod:
              type: string
              format: uri
            proofPurpose:
              type: string
            jws:
              type: string
          x-jsonld: { "@id": "sec:proof" }

    # -------------------- CredentialTokenClass --------------------

    CredentialTokenClass:
      type: object
      description: |
        CredentialTokenClass (UNITS-SBT) - Token class for soulbound credentials.

        Extends NonFungibleTokenClass with:
        - Soulbound characteristics (non-transferable)
        - W3C Verifiable Credentials in claims array
        - Credential-specific metadata (type, level)

        Fixed Properties:
        - transferable: false (soulbound)
        - divisible: false (atomic)
        - burnable: false (only issuer can revoke)
        - revocable: true (issuer can revoke)
        - decimals: 0 (no fractions)
      allOf:
        - $ref: '../non-fungible/attributes.yaml#/components/schemas/NonFungibleTokenClass'
        - type: object
          x-jsonld:
            "@context": https://finternet-io.github.io/specs/schemas/token-class/v1/credential/context.jsonld
            "@type": finternet:CredentialTokenClass
          required:
            - credentialType
            - claims
          properties:
            tokenStandard:
              type: array
              description: Must include "UNITS-SBT" as primary standard
              items:
                type: string
              minItems: 1
              examples:
                - ["UNITS-SBT", "W3C-VC-2.0"]
                - ["UNITS-SBT", "W3C-VC-2.0", "ERC-6239"]
            credentialType:
              $ref: "#/components/schemas/CredentialType"
              description: Type of verification this credential represents
            verificationLevel:
              $ref: "#/components/schemas/VerificationLevel"
              description: Level of assurance for the verification
            claims:
              type: array
              items:
                $ref: "#/components/schemas/VerifiableCredential"
              description: W3C Verifiable Credentials
              minItems: 1
              x-jsonld: { "@id": "finternet:claims", "@container": "@set" }
            flags:
              type: object
              description: Fixed flags for soulbound credentials
              properties:
                transactable:
                  type: boolean
                  default: true
                transferable:
                  type: boolean
                  const: false
                  description: Credentials are soulbound (cannot be transferred)
                divisible:
                  type: boolean
                  const: false
                  description: Credentials cannot be divided
                locked:
                  type: boolean
                  default: false
                revocable:
                  type: boolean
                  default: true
                  description: Issuer can revoke credentials
                burnable:
                  type: boolean
                  const: false
                  description: Holder cannot burn credentials
