openapi: 3.1.0
info:
  title: Finternet Token (UNITS) Schema v1
  version: 1.0.0
  description: |
    Token schema for the Finternet protocol following the UNITS Token Specification.
    Provides a universal, extensible data model for representing any tokenized asset,
    contract, or entitlement.

components:
  schemas:
    # -------------------- Metadata Section --------------------

    TokenMetadata:
      type: object
      description: Static descriptive identity and behavioral profile of the token
      x-jsonld:
        "@context": https://finternet-io.github.io/specs/schemas/token/v1/context.jsonld
        "@type": finternet:TokenMetadata
      required:
        - tokenStandard
        - name
        - symbol
        - decimals
        - fungibility
        - issuer
      properties:
        tokenStandard:
          type: string
          description: Token standard identifier
          x-jsonld: { "@id": "finternet:tokenStandard" }
          examples:
            - UNITS-FT
            - UNITS-NFT
            - ERC20
            - ERC721
        name:
          type: string
          description: Human-readable token name
          minLength: 1
          x-jsonld: { "@id": "schema:name" }
        symbol:
          type: string
          description: Short ticker symbol
          minLength: 1
          maxLength: 10
          x-jsonld: { "@id": "finternet:symbol" }
        decimals:
          type: integer
          description: Number of decimal places (0 for NFTs)
          minimum: 0
          maximum: 18
          x-jsonld: { "@id": "finternet:decimals", "@type": "xsd:integer" }
        fungibility:
          type: string
          description: Token fungibility type
          enum:
            - fungible
            - nonFungible
            - semiFungible
          x-jsonld: { "@id": "finternet:fungibility", "@type": "@vocab" }
        tokenClass:
          type: string
          description: Identifier for the token class/template
          x-jsonld: { "@id": "finternet:tokenClass" }
        version:
          type: string
          description: Version of the token specification
          default: "1.0.0"
          x-jsonld: { "@id": "schema:version" }
        issuer:
          type: string
          format: uri-reference
          description: DID, URI, or identifier of issuer
          x-jsonld: { "@id": "schema:issuer", "@type": "@id" }
        creator:
          type: string
          format: uri-reference
          description: DID, URI, or identifier of creator
          x-jsonld: { "@id": "schema:creator", "@type": "@id" }
        owner:
          type: string
          format: uri-reference
          description: Current logical owner (for NFTs)
          x-jsonld: { "@id": "schema:owner", "@type": "@id" }
        status:
          type: string
          description: Metadata-level status
          enum:
            - active
            - inactive
            - deprecated
            - test
          x-jsonld: { "@id": "finternet:metadataStatus", "@type": "@vocab" }
        valuationType:
          type: string
          description: Valuation model for the token
          enum:
            - fixed
            - pegged
            - market
          x-jsonld: { "@id": "finternet:valuationType", "@type": "@vocab" }
        stateModel:
          type: string
          description: Whether token state is native or proxied
          enum:
            - native
            - proxy
          x-jsonld: { "@id": "finternet:stateModel", "@type": "@vocab" }
        stateProvider:
          $ref: '#/components/schemas/StateProvider'
        valuationModel:
          $ref: '#/components/schemas/ValuationModel'
        flags:
          $ref: '#/components/schemas/TokenFlags'
        tags:
          type: array
          items:
            type: string
          description: Classification tags
          x-jsonld: { "@id": "schema:keywords", "@container": "@set" }
        description:
          type: string
          description: Human-readable description
          x-jsonld: { "@id": "schema:description" }
        externalUrls:
          type: array
          items:
            type: string
            format: uri
          description: URLs to off-chain resources
          x-jsonld: { "@id": "schema:url", "@container": "@set", "@type": "@id" }
        createdAt:
          type: string
          format: date-time
          description: Creation timestamp
          x-jsonld: { "@id": "schema:dateCreated", "@type": "xsd:dateTime" }
        updatedAt:
          type: string
          format: date-time
          description: Last update timestamp
          x-jsonld: { "@id": "schema:dateModified", "@type": "xsd:dateTime" }

    StateProvider:
      type: object
      description: State provider configuration for proxy tokens
      x-jsonld:
        "@context": https://finternet-io.github.io/specs/schemas/token/v1/context.jsonld
        "@type": finternet:StateProvider
      required:
        - type
      properties:
        type:
          type: string
          description: Type of state provider
          enum:
            - chain
            - registry
            - custodian
          x-jsonld: { "@id": "finternet:stateProviderType", "@type": "@vocab" }
        network:
          type: string
          description: Network identifier
          x-jsonld: { "@id": "finternet:network" }
        contract:
          type: string
          description: Contract address or identifier
          x-jsonld: { "@id": "finternet:contract" }
        tokenId:
          type: string
          description: Token ID for NFTs
          x-jsonld: { "@id": "finternet:externalTokenId" }
        proofFormat:
          type: string
          description: Proof format used
          enum:
            - merkle-proof
            - zk-proof
            - signature-chain
            - registry-based
          x-jsonld: { "@id": "finternet:proofFormat", "@type": "@vocab" }

    ValuationModel:
      type: object
      description: Detailed valuation model configuration
      x-jsonld:
        "@context": https://finternet-io.github.io/specs/schemas/token/v1/context.jsonld
        "@type": finternet:ValuationModel
      properties:
        parValue:
          $ref: '#/components/schemas/ParValue'
        redeemableBy:
          type: string
          description: Entity responsible for redemption
          x-jsonld: { "@id": "finternet:redeemableBy" }
        peggedTo:
          $ref: '#/components/schemas/PeggedTo'
        valuationPolicy:
          $ref: '#/components/schemas/ValuationPolicy'

    ParValue:
      type: object
      description: Par value configuration for fixed-value tokens
      x-jsonld:
        "@context": https://finternet-io.github.io/specs/schemas/token/v1/context.jsonld
        "@type": finternet:ParValue
      required:
        - amount
        - currency
      properties:
        amount:
          type: string
          description: Immutable face value per token unit
          x-jsonld: { "@id": "finternet:parValueAmount" }
        currency:
          type: string
          description: Currency code (ISO 4217 or similar)
          x-jsonld: { "@id": "finternet:currency" }

    PeggedTo:
      type: object
      description: Peg configuration for pegged tokens
      x-jsonld:
        "@context": https://finternet-io.github.io/specs/schemas/token/v1/context.jsonld
        "@type": finternet:PeggedTo
      required:
        - assetCode
      properties:
        assetCode:
          type: string
          description: Target reference asset code
          x-jsonld: { "@id": "finternet:assetCode" }
        source:
          type: string
          description: Source authority
          x-jsonld: { "@id": "finternet:source" }

    ValuationPolicy:
      type: object
      description: Valuation policy for market-priced tokens
      x-jsonld:
        "@context": https://finternet-io.github.io/specs/schemas/token/v1/context.jsonld
        "@type": finternet:ValuationPolicy
      properties:
        requiresExternalClaims:
          type: boolean
          description: Whether value must come from claims
          x-jsonld: { "@id": "finternet:requiresExternalClaims", "@type": "xsd:boolean" }
        recommendedClaimTypes:
          type: array
          items:
            type: string
          description: Recommended claim types for valuation
          x-jsonld: { "@id": "finternet:recommendedClaimTypes", "@container": "@set" }

    TokenFlags:
      type: object
      description: Behavioral flags for the token
      x-jsonld:
        "@context": https://finternet-io.github.io/specs/schemas/token/v1/context.jsonld
        "@type": finternet:TokenFlags
      properties:
        transactable:
          type: boolean
          description: Whether the token can be transacted
          default: true
          x-jsonld: { "@id": "finternet:transactable", "@type": "xsd:boolean" }
        transferable:
          type: boolean
          description: Whether ownership can be transferred
          default: true
          x-jsonld: { "@id": "finternet:transferable", "@type": "xsd:boolean" }
        locked:
          type: boolean
          description: High-level lock flag
          default: false
          x-jsonld: { "@id": "finternet:locked", "@type": "xsd:boolean" }
        revocable:
          type: boolean
          description: Whether the issuer can revoke this token
          default: false
          x-jsonld: { "@id": "finternet:revocable", "@type": "xsd:boolean" }

    # -------------------- State Section --------------------

    TokenState:
      type: object
      description: Runtime lifecycle and status of the token
      x-jsonld:
        "@context": https://finternet-io.github.io/specs/schemas/token/v1/context.jsonld
        "@type": finternet:TokenState
      required:
        - status
      properties:
        status:
          type: string
          description: Lifecycle status of the token
          enum:
            - active
            - frozen
            - redeemed
            - burned
            - expired
          x-jsonld: { "@id": "finternet:lifecycleStatus", "@type": "@vocab" }
        effectiveFrom:
          type: string
          format: date-time
          description: Effective start date
          x-jsonld: { "@id": "finternet:effectiveFrom", "@type": "xsd:dateTime" }
        effectiveUntil:
          type: string
          format: date-time
          description: Effective end date
          x-jsonld: { "@id": "finternet:effectiveUntil", "@type": "xsd:dateTime" }
        supply:
          $ref: '#/components/schemas/Supply'
        currentOwner:
          type: string
          format: uri-reference
          description: Current owner identifier (for NFTs)
          x-jsonld: { "@id": "finternet:currentOwner", "@type": "@id" }
        lockState:
          $ref: '#/components/schemas/LockState'
        restrictions:
          $ref: '#/components/schemas/Restrictions'
        customState:
          type: object
          description: Token-class-specific state fields
          additionalProperties: true
          x-jsonld: { "@id": "finternet:customState", "@type": "@json" }
        stateCommitment:
          type: string
          description: Hash/commitment representing this state
          x-jsonld: { "@id": "finternet:stateCommitment" }

    Supply:
      type: object
      description: Supply information for fungible tokens
      x-jsonld:
        "@context": https://finternet-io.github.io/specs/schemas/token/v1/context.jsonld
        "@type": finternet:Supply
      properties:
        totalSupply:
          type: string
          description: Total supply (string for big numbers)
          x-jsonld: { "@id": "finternet:totalSupply" }
        circulatingSupply:
          type: string
          description: Circulating supply (string for big numbers)
          x-jsonld: { "@id": "finternet:circulatingSupply" }

    LockState:
      type: object
      description: Detailed lock state information
      x-jsonld:
        "@context": https://finternet-io.github.io/specs/schemas/token/v1/context.jsonld
        "@type": finternet:LockState
      required:
        - locked
      properties:
        locked:
          type: boolean
          description: Whether the token is locked
          x-jsonld: { "@id": "finternet:isLocked", "@type": "xsd:boolean" }
        lockReason:
          type: string
          description: Reason or code for the lock
          x-jsonld: { "@id": "finternet:lockReason" }
        lockedBy:
          type: string
          format: uri-reference
          description: Entity that applied the lock
          x-jsonld: { "@id": "finternet:lockedBy", "@type": "@id" }
        lockedAt:
          type: string
          format: date-time
          description: Lock timestamp
          x-jsonld: { "@id": "finternet:lockedAt", "@type": "xsd:dateTime" }

    Restrictions:
      type: object
      description: High-level restrictions on token use/transfer
      x-jsonld:
        "@context": https://finternet-io.github.io/specs/schemas/token/v1/context.jsonld
        "@type": finternet:Restrictions
      properties:
        jurisdiction:
          type: array
          items:
            type: string
          description: Allowed/disallowed jurisdictions (ISO 3166-1 alpha-2)
          x-jsonld: { "@id": "finternet:jurisdiction", "@container": "@set" }
        allowedUseCases:
          type: array
          items:
            type: string
          description: Allowed use cases
          x-jsonld: { "@id": "finternet:allowedUseCases", "@container": "@set" }

    # -------------------- Claims Section --------------------

    Claim:
      type: object
      description: Verifiable credential or attestation about the token
      x-jsonld:
        "@context": https://finternet-io.github.io/specs/schemas/token/v1/context.jsonld
        "@type": vc:VerifiableCredential
      required:
        - id
        - "@context"
        - type
        - issuer
        - issuanceDate
        - credentialSubject
      properties:
        id:
          type: string
          format: uri
          description: Unique identifier for this claim
          x-jsonld: { "@id": "@id", "@type": "@id" }
        "@context":
          oneOf:
            - type: string
            - type: array
              items:
                type: string
          description: JSON-LD context for the claim
        type:
          oneOf:
            - type: string
            - type: array
              items:
                type: string
          description: Claim types
          x-jsonld: { "@id": "@type", "@type": "@vocab" }
        issuer:
          type: string
          format: uri-reference
          description: DID/URI of claim issuer
          x-jsonld: { "@id": "vc:issuer", "@type": "@id" }
        issuanceDate:
          type: string
          format: date-time
          description: Claim issuance date
          x-jsonld: { "@id": "vc:issuanceDate", "@type": "xsd:dateTime" }
        expirationDate:
          type: string
          format: date-time
          description: Claim expiration date
          x-jsonld: { "@id": "vc:expirationDate", "@type": "xsd:dateTime" }
        visibility:
          type: string
          description: Visibility/privacy level of the claim
          enum:
            - public
            - private
            - protected
          x-jsonld: { "@id": "finternet:visibility", "@type": "@vocab" }
        credentialSubject:
          type: object
          description: Subject of the claim
          required:
            - id
          properties:
            id:
              type: string
              format: uri-reference
              description: Subject identifier
              x-jsonld: { "@id": "@id", "@type": "@id" }
          additionalProperties: true
          x-jsonld: { "@id": "vc:credentialSubject" }
        proof:
          $ref: '#/components/schemas/Proof'
        status:
          type: string
          description: Status of the claim
          enum:
            - asserted
            - verified
            - revoked
            - expired
          x-jsonld: { "@id": "finternet:claimStatus", "@type": "@vocab" }

    Proof:
      type: object
      description: Cryptographic proof for a claim
      x-jsonld:
        "@context": https://finternet-io.github.io/specs/schemas/token/v1/context.jsonld
        "@type": sec:Proof
      required:
        - type
        - created
        - verificationMethod
        - proofPurpose
      properties:
        type:
          type: string
          description: Proof type
          x-jsonld: { "@id": "@type" }
        created:
          type: string
          format: date-time
          description: Proof creation timestamp
          x-jsonld: { "@id": "sec:created", "@type": "xsd:dateTime" }
        verificationMethod:
          type: string
          format: uri
          description: URI for public key/verification method
          x-jsonld: { "@id": "sec:verificationMethod", "@type": "@id" }
        proofPurpose:
          type: string
          description: Purpose of the proof
          x-jsonld: { "@id": "sec:proofPurpose" }
        jws:
          type: string
          description: Compact JWS or signature encoding
          x-jsonld: { "@id": "sec:jws" }
