# Finternet UNITS — Transfer Policy Credential Requirement Schema
# 
# This schema defines how Token Managers configure credential requirements
# in token class transfer policies. It specifies which credential types are
# required for a transfer and what proof modes (VC / VP / ZKP) are acceptable.
#
# This is the integration layer between:
#   - Credential Token system (W3C VC 2.0)
#   - Verifiable Presentations (VP) 
#   - Zero-Knowledge Proofs (ZKP)
#   - Token Transfer Policy Evaluator

$schema: "http://json-schema.org/draft-07/schema#"
title: "Finternet UNITS Transfer Policy — Credential Requirements"
description: >
  Defines how a Token Manager specifies credential-based compliance
  requirements for token transfers. The policy evaluator checks the
  holder's credential store and accepts VC, VP, or ZKP as configured.

type: object
required:
  - policyId
  - tokenClassId
  - credentialRequirements

properties:
  policyId:
    type: string
    format: uri
    description: "Unique identifier for this transfer policy"
    example: "urn:finternet:policy:transfer:regulated-token-v1"

  tokenClassId:
    type: string
    description: "The token class this policy applies to"
    example: "finternet:token-class:regulated-money-market-fund"

  description:
    type: string
    description: "Human-readable policy description"
    example: "Requires KYC verification and credit score > 750 for transfers over ₹10L"

  credentialRequirements:
    description: >
      List of credential checks that must ALL pass before a transfer
      is permitted. Each requirement specifies the credential type
      and accepted proof modes.
    type: array
    items:
      type: object
      required:
        - credentialType
        - acceptedProofTypes
      properties:
        credentialType:
          type: string
          description: "The W3C VC type required (must be in holder's credential store)"
          example: "FinternetKYCCredential"

        acceptedProofTypes:
          description: >
            Which proof modes the policy evaluator will accept for this check.
            Token Managers can configure this per-requirement.
          type: array
          items:
            type: string
            enum:
              - "VC"     # Full Verifiable Credential (legacy — all claims exposed)
              - "VP"     # Verifiable Presentation (selected claims only)
              - "ZKP"    # Zero-Knowledge Proof (predicate proven, no raw values)
          example: ["VP", "ZKP"]

        requiredClaims:
          description: >
            For VP proof type: which claims must be revealed in the presentation.
          type: array
          items:
            type: string
          example:
            - "credentialSubject.kycStatus"
            - "credentialSubject.jurisdiction"

        requiredPredicates:
          description: >
            For ZKP proof type: predicate conditions that must be proven.
            The raw claim value is never revealed to the verifier.
          type: array
          items:
            type: object
            required:
              - claimPath
              - predicateType
            properties:
              claimPath:
                type: string
                example: "credentialSubject.creditScore"
              predicateType:
                type: string
                enum:
                  - "greaterThan"
                  - "greaterThanOrEqual"
                  - "lessThan"
                  - "lessThanOrEqual"
                  - "memberOf"
                  - "notMemberOf"
              threshold:
                oneOf:
                  - type: integer
                  - type: number
              memberSet:
                type: array
                items:
                  type: string

  # -------------------------------------------------------------------
  # Policy Evaluation Logging
  # -------------------------------------------------------------------
  evaluationLogging:
    description: >
      Configures what is recorded in the transfer audit log.
      The proof type used (VC/VP/ZKP) is ALWAYS logged.
      Raw credential data is NEVER stored in the log.
    type: object
    properties:
      logProofType:
        type: boolean
        description: "Log which proof type was used (always true)"
        default: true
      logCredentialType:
        type: boolean
        description: "Log which credential type was checked"
        default: true
      logPredicateResults:
        type: boolean 
        description: "Log pass/fail for each predicate (without raw values)"
        default: true
      storeCredentialData:
        type: boolean
        description: "Store raw credential data in log (MUST be false for privacy)"
        default: false
        enum: [false]

# -------------------------------------------------------------------
# Example: Regulated Fund Transfer Policy
# -------------------------------------------------------------------
# {
#   "policyId": "urn:finternet:policy:transfer:regulated-fund-v1",
#   "tokenClassId": "finternet:token-class:money-market-fund-IN",
#   "description": "KYC + credit check for regulated fund transfers",
#   "credentialRequirements": [
#     {
#       "credentialType": "FinternetKYCCredential",
#       "acceptedProofTypes": ["VP", "ZKP"],
#       "requiredClaims": ["credentialSubject.kycStatus"],
#       "requiredPredicates": [
#         {
#           "claimPath": "credentialSubject.jurisdiction",
#           "predicateType": "memberOf",
#           "memberSet": ["IN", "SG"]
#         },
#         {
#           "claimPath": "credentialSubject.creditScore",
#           "predicateType": "greaterThan",
#           "threshold": 750
#         }
#       ]
#     }
#   ],
#   "evaluationLogging": {
#     "logProofType": true,
#     "logCredentialType": true,
#     "logPredicateResults": true,
#     "storeCredentialData": false
#   }
# }

